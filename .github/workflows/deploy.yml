name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          DATABASE_URL: file:./prisma/ci.db
          JWT_SECRET: ci-build-secret
          ADMIN_EMAIL: ci@example.com
          ADMIN_PASSWORD: ci-password
        run: |
          npm run db:generate
          npm run build

      - name: Write production environment file
        env:
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: printf '%s' "$PRODUCTION_ENV_FILE" > .env.production

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SERVER_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync project to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          rsync -az --delete -e "ssh -p ${SERVER_PORT:-22}" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude 'out' \
            --exclude 'prisma/*.db' \
            --exclude 'prisma/*.db-journal' \
            --exclude 'public/uploads' \
            ./ "${SERVER_USER}@${SERVER_HOST}:${SERVER_APP_DIR}/"

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" \
            "cd '${SERVER_APP_DIR}' && chmod +x scripts/docker-entrypoint.sh scripts/deploy.sh && APP_DIR='${SERVER_APP_DIR}' ./scripts/deploy.sh"
